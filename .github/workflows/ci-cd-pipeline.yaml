name: ci-cd-pipeline
run-name: ${{ github.actor }} is running the deploy pipeline 🚀

on:
  pull_request:
    branches: main
    types: [ opened, synchronize, reopened, closed ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN}}
  BAKEHOUSE_STACK_NAME: ${{ vars.BAKEHOUSE_STACK_NAME }}

jobs:
  if-merged:
    name: Running on main branch
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - run: |
          echo "The PR was merged"
          echo "Now running pipeline on main branch"

  deploy:
    name: Deploy stack to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run install script
        run: ./install.sh

      - name: Extract student information # might not need this
        id: student-info
        run: |
          STUDENT_NAME="${{ github.actor }}"
          echo "name=${STUDENT_NAME}" >> $GITHUB_ENV
          echo "Student: ${STUDENT_NAME}"

      - name: Generate enhanced session name
        id: session-naming
        run: |
          STUDENT="${{ github.actor }}"
          RUN_ID="${{ github.run_id }}"
          ATTEMPT="${{ github.run_attempt }}"

          SESSION_NAME="gha-cdk-${STUDENT}-${RUN_ID}-${ATTEMPT}"

          echo "session-name=${SESSION_NAME}" >> $GITHUB_OUTPUT
          echo "Generated session name: ${SESSION_NAME}"
          echo "Length: ${#SESSION_NAME} characters (max 64)"

          # Validate length
          if [ ${#SESSION_NAME} -gt 64 ]; then
              echo "❌ Session name too long!"
              exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
            role-session-name: ${{ steps.session-naming.outputs.session-name }}
            aws-region: ${{ env.AWS_REGION }}

      - name: Verify OIDC credentials
        run: |
          echo "Verifying AWS credentials..."
          IDENTITY=$(aws sts get-caller-identity)
          echo "Assumed role:"
          echo "${IDENTITY}" | jq '.'

          ROLE_SESSION=$(echo "${IDENTITY}" | jq -r '.Arn' | grep -oP '(?<=/)[^/]+$')
          echo "Current session: ${ROLE_SESSION}"

      - name: Synth the stack
        run: npx cdk synth

      - name: Deploy the stack
        run: npx cdk deploy --all --require-approval never

  test:
    name: Run tests on deployment
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run install script
        run: ./install.sh

      - name: Install playwright browsers
        run: npx playwright install --with-deps

      - name: Run playwright tests
        run: npx playwright test
